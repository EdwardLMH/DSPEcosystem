apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-external-declarative-config
  namespace: gateway-public
data:
  kong.yaml: |
    _format_version: "3.0"
    _transform: true
    services:
      - name: sdui-api
        url: http://sdui-api.sdui-public.svc.cluster.local:8080
        routes:
          - name: sdui-screen-api
            paths:
              - /api/v1/screen
            strip_path: false
          - name: sdui-search-api
            paths:
              - /api/v1/search
            strip_path: false
          - name: sdui-event-api
            paths:
              - /api/v1/events
            strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 6000
              policy: local
          - name: request-size-limiting
            config:
              allowed_payload_size: 2
          - name: cors
            config:
              origins:
                - https://sdui.example.cn
                - https://sdui-test.example.cn
                - https://www.example.cn
                - https://web-test.example.cn
              methods:
                - GET
                - POST
                - OPTIONS
              headers:
                - Accept
                - Authorization
                - Content-Type
                - X-Client-Platform
                - X-Request-Id
              exposed_headers:
                - X-Request-Id
              credentials: false
              max_age: 3600
    plugins:
      - name: correlation-id
        config:
          header_name: X-Request-Id
          generator: uuid
          echo_downstream: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-external
  namespace: gateway-public
  labels:
    app: kong-external
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kong-external
  template:
    metadata:
      labels:
        app: kong-external
    spec:
      containers:
        - name: kong
          image: kong:3.7
          imagePullPolicy: IfNotPresent
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/declarative/kong.yaml
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_LISTEN
              value: "off"
          ports:
            - name: proxy
              containerPort: 8000
            - name: status
              containerPort: 8100
          readinessProbe:
            httpGet:
              path: /status
              port: status
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: status
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: kong-config
              mountPath: /kong/declarative
      volumes:
        - name: kong-config
          configMap:
            name: kong-external-declarative-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong-external-proxy
  namespace: gateway-public
  labels:
    app: kong-external
spec:
  type: LoadBalancer
  selector:
    app: kong-external
  ports:
    - name: proxy
      port: 80
      targetPort: proxy

