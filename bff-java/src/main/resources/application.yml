server:
  port: 8080

spring:
  application:
    name: hsbc-dsp-bff
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    ssl: true
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes default TTL

stripes:
  base-url: ${STRIPES_CMS_URL:https://cms.hsbc.internal}
  api-key: ${STRIPES_API_KEY}

analytics:
  gcp-endpoint: ${GCP_PUBSUB_ENDPOINT:https://pubsub.googleapis.com}
  sensor-data-endpoint: ${SENSORDATA_ENDPOINT:https://sa.hsbc.cn}

optimizely:
  sdk-key: ${OPTIMIZELY_SDK_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
